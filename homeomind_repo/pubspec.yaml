name: homeomind
description: Offline-first homeopathic case-taking app with AI remedy suggestions. Local SQLite storage, zip backup, Material 3 botanical design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # storage
  sqflite: ^2.3.2
  sqflite_common_ffi_web: ^0.4.5   # SQLite on Flutter Web (WASM/IndexedDB)
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0   # encrypted API key storage
  path: ^1.9.0
  sembast: ^3.7.0
  sembast_web: ^2.3.0

  # backup
  archive: ^3.4.10
  file_saver: ^0.2.12

  # AI
  http: ^1.2.1

  # UI
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
